// ── Normalize violation type strings to canonical forms ──
function normalizeViolation(v) {
  if (!v) return "";

function mapRowsToCases(headers, dataRows) {

    // Collect filing/order links (may be multiple, separated by ; or numbered like "1) url ; 2) url")

        const cleaned = part.replace(/^\d+\)\s*/, "").trim();

          if (!filingUrls.includes(cleaned)) filingUrls.push(cleaned);
        } else {
          // Try parsing as HTML
          const fp = parseHtmlCell(cleaned);
          fp.urls.forEach(u => {
            if (!filingUrls.includes(u)) filingUrls.push(u);
          });
        }
      }
    }

    // Collect full docket link
    let docketUrl = null;
    const docketVal = get(iDocketLink);

    filingUrls.forEach(u => {

    for (let i = 0; i < row.length; i++) {

          if (u.includes("courtlistener.com") && !clUrls.includes(u)) clUrls.push(u);

        if (val.startsWith("http") && val.includes("courtlistener.com") && !clUrls.includes(val)) clUrls.push(val);
